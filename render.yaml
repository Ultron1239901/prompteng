services:
  - type: web
    name: promptlab-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: openai/gpt-4o
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app,http://localhost:5173 